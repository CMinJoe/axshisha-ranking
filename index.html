function NeonText({ color = "blue", children, size = 28, weight = 800, family = "Sora", style = {} }) {
  const c = NEON[color];
  return (
    <span style={{
      fontFamily: family, fontWeight: weight, fontSize: size, color: "#fff",
      textShadow: `0 0 6px ${c.core}, 0 0 14px ${c.glow}, 0 0 28px ${c.glow}`,
      ...style,
    }}>{children}</span>
  );
}

function Avatar({ name, color = "blue", size = 44 }) {
  const c = NEON[color];
  const initials = name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: `radial-gradient(circle at 30% 30%, ${c.glow}, #1a0b3d 70%)`,
      display: "grid", placeItems: "center",
      color: "#fff", fontFamily: "Sora", fontWeight: 700, fontSize: size * 0.36,
      border: `1.5px solid ${c.core}`,
      boxShadow: `inset 0 0 12px ${c.soft}, 0 0 8px ${c.soft}`,
      flexShrink: 0,
    }}>{initials}</div>
  );
}

function NeonRing({ color = "blue", padding = 1, children, intensity = 1 }) {

      borderRadius: 999, padding,

      boxShadow: `0 0 ${10 * intensity}px ${c.soft}, 0 0 ${24 * intensity}px ${c.soft}`,

  );
}

function NeonStreakBg({ density = 1 }) {
  const lines = [];
  for (let i = 0; i < 12 * density; i++) {
    const x = (i * 73) % 100;
    const y = (i * 47) % 100;
    const len = 12 + ((i * 29) % 30);
    const c = i % 3 !== 0 ? NEON.blue : NEON.magenta;
    lines.push(
      <div key={i} style={{
        position: "absolute", left: `${x}%`, top: `${y}%`,
        width: `${len}%`, height: 1.5,
        background: c.core, opacity: 0.55,
        transform: "rotate(-28deg)", transformOrigin: "left center",
        boxShadow: `0 0 6px ${c.core}, 0 0 14px ${c.glow}`,
      }} />
    );
  }
  return <div style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none" }}>{lines}</div>;
}

function MemberQrModal({ onClose }) {
  const memberCode = "AX-2048-7391-Y";
  const size = 25;
  const hash = (i, j) => {
    const x = Math.sin(i * 374.7 + j * 91.3 + 13.1) * 43758.5453;
    return (x - Math.floor(x)) > 0.5;
  };
  const cells = [];
  for (let i = 0; i < size; i++)
    for (let j = 0; j < size; j++)
      cells.push({ i, j, on: hash(i, j) });

  const isFinder = (i, j) => {
    const inBox = (oi, oj) => i >= oi && i < oi + 7 && j >= oj && j < oj + 7;
    return inBox(0, 0) || inBox(0, size - 7) || inBox(size - 7, 0);
  };
  const finderOn = (i, j) => {
    const check = (oi, oj) => {
      const li = i - oi, lj = j - oj;
      return li === 0 || li === 6 || lj === 0 || lj === 6 || (li >= 2 && li <= 4 && lj >= 2 && lj <= 4);
    };
    if (i >= 0 && i < 7 && j >= 0 && j < 7) return check(0, 0);
    if (i >= 0 && i < 7 && j >= size - 7) return check(0, size - 7);
    if (i >= size - 7 && j >= 0 && j < 7) return check(size - 7, 0);
    return false;
  };

  return (
    <div onClick={onClose} style={{
      position: "absolute", inset: 0,
      background: "rgba(2,0,16,0.78)", backdropFilter: "blur(8px)",
      zIndex: 30, display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
    }}>
      <style>{`
        @keyframes qrPopIn { from { opacity:0; transform:scale(0.92) translateY(8px) } to { opacity:1; transform:scale(1) translateY(0) } }
      `}</style>
      <div onClick={e => e.stopPropagation()} style={{
        width: "100%", borderRadius: 24, padding: "26px 22px 22px",
        background: "linear-gradient(160deg, rgba(40,15,80,0.95), rgba(15,5,45,0.95))",
        border: `1.5px solid ${NEON.magenta.core}`,
        boxShadow: `0 0 28px ${NEON.magenta.soft}, 0 0 60px ${NEON.blue.soft}, inset 0 0 24px ${NEON.magenta.soft}`,
        position: "relative", animation: "qrPopIn 280ms cubic-bezier(0.2,0.8,0.2,1)",
      }}>
        <button onClick={onClose} style={{
          position: "absolute", top: 14, right: 14,
          width: 32, height: 32, borderRadius: "50%",
          background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)",
          color: "#fff", fontSize: 18, cursor: "pointer", display: "grid", placeItems: "center",
        }}>×</button>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontFamily: "Inter", fontSize: 10, color: "rgba(255,255,255,0.55)", letterSpacing: "0.18em", textTransform: "uppercase" }}>AX SHISHA · Member QR</div>
          <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 19, color: "#fff", marginTop: 6 }}>請出示給店員掃描</div>
          <div style={{ fontFamily: "Inter", fontSize: 11, color: "rgba(255,255,255,0.5)", marginTop: 4, lineHeight: 1.5 }}>結帳時掃描此碼，消費將自動累積點數</div>
        </div>
        <div style={{
          marginTop: 18, display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
          padding: "10px 14px", borderRadius: 12,
          background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
        }}>
          <Avatar name={ME.name} color="blue" size={32} />
          <div>
            <div style={{ fontFamily: "Sora", fontWeight: 600, fontSize: 12, color: "#fff" }}>你的會員</div>
            <div style={{ fontFamily: "Inter", fontSize: 10, color: "rgba(255,255,255,0.55)" }}>{ME.handle}</div>
          </div>
          <div style={{ flex: 1 }} />
          <span style={{
            fontFamily: "Sora", fontSize: 10, fontWeight: 700,
            padding: "3px 9px", borderRadius: 999,
            background: `linear-gradient(135deg, ${NEON.blue.core}, ${NEON.blue.glow})`,
            color: "#fff", boxShadow: `0 0 8px ${NEON.blue.soft}`,
          }}>{ME.level}</span>
        </div>
        <div style={{
          marginTop: 18, padding: 16, borderRadius: 18, background: "#fff",
          boxShadow: `0 0 24px ${NEON.magenta.soft}, 0 0 48px ${NEON.blue.soft}`,
          display: "grid", placeItems: "center",
        }}>
          <div style={{
            width: 220, height: 220, display: "grid",
            gridTemplateColumns: `repeat(${size}, 1fr)`,
            gridTemplateRows: `repeat(${size}, 1fr)`,
            position: "relative",
          }}>
            {cells.map(({ i, j, on }) => {
              const filled = isFinder(i, j) ? finderOn(i, j) : on;
              return <div key={`${i}-${j}`} style={{ background: filled ? "#0a0524" : "transparent", borderRadius: 1 }} />;
            })}
            <div style={{
              position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)",

        <div style={{ width: 26, height: 12, border: "1.5px solid rgba(255,255,255,0.85)", borderRadius: 3.5, position: "relative", marginLeft: 2 }}>
          <div style={{ position: "absolute", inset: 1.5, background: "#fff", borderRadius: 1.5, width: "80%" }} />
          <div style={{ position: "absolute", right: -3, top: 3, width: 1.5, height: 4, background: "rgba(255,255,255,0.85)", borderRadius: 1 }} />
        </div>
      </div>
    </div>
  );
}

// ─── Phone Frame ──────────────────────────────────────────────

function PhoneFrame({ children, glow = "blue" }) {
  const c = NEON[glow];
  return (
    <div style={{
      width: 390, height: 844, borderRadius: 54, padding: 10,
      background: "#0a0a0e", border: "1px solid #1a1a22",
      boxShadow: `0 0 0 1.5px #2a2a35, 0 0 30px ${c.soft}, 0 0 60px ${c.soft}, 0 30px 80px rgba(0,0,0,0.5)`,
      position: "relative", flexShrink: 0,
    }}>
      <div style={{ width: "100%", height: "100%", borderRadius: 44, overflow: "hidden", position: "relative", background: "#050116" }}>
        <div style={{
          position: "absolute", top: 10, left: "50%", transform: "translateX(-50%)",
          width: 120, height: 32, borderRadius: 999, background: "#000", zIndex: 20,
        }} />
        {children}
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────

function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [tab, setTab] = useState("leaderboard");
  const [qrOpen, setQrOpen] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  }, [tab, loggedIn]);

  let screen, glow;
  if (!loggedIn) {
    screen = <LoginScreen onLogin={() => setLoggedIn(true)} />;
    glow = "magenta";
  } else if (tab === "leaderboard") {
    screen = <LeaderboardScreen />;
    glow = "blue";
  } else {
    screen = <RewardsScreen />;
    glow = "magenta";
  }

  const navBtnStyle = (active) => ({
    padding: "8px 14px", borderRadius: 10,
    border: `1px solid ${active ? NEON.blue.core : "rgba(255,255,255,0.12)"}`,
    background: active ? NEON.blue.soft : "rgba(255,255,255,0.05)",
    color: "#fff", fontFamily: "Sora", fontSize: 12, fontWeight: 600,
    cursor: "pointer", backdropFilter: "blur(8px)",
    boxShadow: active ? `0 0 12px ${NEON.blue.soft}` : "none",
  });

  return (
    <div style={{
      minHeight: "100vh", width: "100%", background: "#020010",
      backgroundImage: `
        radial-gradient(circle at 20% 30%, oklch(0.18 0.18 280 / 0.5), transparent 50%),
        radial-gradient(circle at 80% 70%, oklch(0.18 0.20 340 / 0.45), transparent 50%)
      `,
      display: "flex", alignItems: "center", justifyContent: "center",
      flexWrap: "wrap", gap: 48, padding: "48px 24px",
    }}>
      <div style={{ position: "fixed", top: 16, left: 16, zIndex: 100, display: "flex", gap: 8, flexWrap: "wrap" }}>
        <button onClick={() => { setLoggedIn(false); setTab("leaderboard"); }} style={navBtnStyle(false)}>登出</button>
        {loggedIn && (
          <>
            <button onClick={() => setTab("leaderboard")} style={navBtnStyle(tab === "leaderboard")}>排行榜</button>
            <button onClick={() => setTab("rewards")} style={navBtnStyle(tab === "rewards")}>福利中心</button>
          </>
        )}
      </div>
      <PhoneFrame glow={glow}>
        <StatusBar />
        <div ref={scrollRef} style={{ width: "100%", height: "100%", overflowY: "auto", overflowX: "hidden", scrollbarWidth: "none" }}>
          {screen}
        </div>
        {loggedIn && <BottomNav current={tab} setCurrent={setTab} onShowQr={() => setQrOpen(true)} />}
        {loggedIn && qrOpen && <MemberQrModal onClose={() => setQrOpen(false)} />}
      </PhoneFrame>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
